name: Competitor Intel — Monthly Run

on:
  schedule:
    - cron: '0 8 1 * *'
  workflow_dispatch:

jobs:
  run-intel:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Run competitor intel
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/run-intel.js

      - name: Commit outputs
        run: |
          git config --global user.name "Intel Bot"
          git config --global user.email "bot@corasystems.com"
          git add intel-outputs/
          git diff --staged --quiet || git commit -m "Intel run: $(date +%Y-%m-%d)"
          git push

      - name: Send email with intel report
        if: always()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "Competitor Intel — monthly report ready (${{ github.run_number }})"
          to: cbeirne@corasystems.com
          from: "Cora Competitor Intel <${{ secrets.MAIL_USERNAME }}>"
          body: |
            Your monthly competitor intelligence report has run.

            View full run: https://github.com/cbbeirne/competitor-intel-runner/actions/runs/${{ github.run_id }}

            The full intel report is attached as a markdown file.

            Next run: 1st of next month 08:00 UTC

            — Cora Competitor Intel
          attachments: intel-outputs/*.md
